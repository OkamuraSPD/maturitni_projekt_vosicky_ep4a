{% extends "layout.html" %}{% block content %}<div class="card form-card"><h2>Přihlášení / připojení do domácnosti</h2><form method="post"><label>Home ID</label><input name="home_id" required><label>Heslo domácnosti</label><input name="home_password" type="password" required><button>Připojit</button></form></div><div class='card'><h3>Tvoje domácnosti</h3>{% if homes %}<ul class='nice-list'>{% for h in homes %}<li>🏠 ID {{ h["id"] }} – {{ h["name"] }} (role: {{ h["role"] }})</li>{% endfor %}</ul>{% else %}<p>Nemáš žádnou domácnost.</p>{% endif %}</div>{% endblock %}
